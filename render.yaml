services:
  - type: web
    name: tech-agent-daily
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.web_entry
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
    disk:
      name: agent-data
      mountPath: /opt/render/project/data
      sizeGB: 1
